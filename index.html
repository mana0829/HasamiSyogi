<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>はさみ将棋</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: #f5f5f5;
}

.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  width: 90vw;
  max-width: 400px;
  aspect-ratio: 1;
  margin: auto;
  background: white;
}

.cell {
  border: 1px solid #333;
  font-size: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.selected {
  background: #ffd966;
}

.highlight {
  background: #a8d8ff;
}

#message {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>はさみ将棋</h2>

<p id="turn">黒の番</p>
<p id="count">黒：5　白：5</p>
<p id="message"></p>

<label>
  <input type="checkbox" id="onePieceLose" checked>
  1個になったら負け
</label>

<br><br>

<div id="board" class="board"></div>

<br>
<button onclick="init()">リセット</button>

<script>
const EMPTY = 0;
const BLACK = 1;
const WHITE = 2;

let board;
let currentPlayer;
let selected = null;
let gameOver = false;

function init() {
  board = [
    [BLACK, BLACK, BLACK, BLACK, BLACK],
    [EMPTY, EMPTY, EMPTY, EMPTY, EMPTY],
    [EMPTY, EMPTY, EMPTY, EMPTY, EMPTY],
    [EMPTY, EMPTY, EMPTY, EMPTY, EMPTY],
    [WHITE, WHITE, WHITE, WHITE, WHITE],
  ];
  currentPlayer = BLACK;
  selected = null;
  gameOver = false;
  draw();
}

function draw() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.onclick = () => onClick(r, c);

      if (selected && selected.r === r && selected.c === c) {
        cell.classList.add("selected");
      }

      if (board[r][c] === BLACK) cell.textContent = "●";
      if (board[r][c] === WHITE) cell.textContent = "○";

      boardDiv.appendChild(cell);
    }
  }

  showMoves();
  updateStatus();
}

function onClick(r, c) {
  if (gameOver) return;

  if (selected) {
    const moves = getMoves(selected.r, selected.c);

    if (moves.some(m => m.r === r && m.c === c)) {
      move(selected, { r, c });
      capture(r, c);
      selected = null;

      if (!checkWinner()) {
        currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
      }

      draw();
      return;
    }

    selected = null;
    draw();
    return;
  }

  if (board[r][c] === currentPlayer) {
    selected = { r, c };
    draw();
  }
}

function getMoves(r, c) {
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  const moves = [];

  for (const [dr, dc] of dirs) {
    let nr = r + dr;
    let nc = c + dc;

    while (
      nr >= 0 && nr < 5 &&
      nc >= 0 && nc < 5 &&
      board[nr][nc] === EMPTY
    ) {
      moves.push({ r: nr, c: nc });
      nr += dr;
      nc += dc;
    }
  }
  return moves;
}

function showMoves() {
  if (!selected) return;

  const moves = getMoves(selected.r, selected.c);
  const cells = document.querySelectorAll(".cell");

  moves.forEach(m => {
    const index = m.r * 5 + m.c;
    cells[index].classList.add("highlight");
  });
}

function move(from, to) {
  board[to.r][to.c] = board[from.r][from.c];
  board[from.r][from.c] = EMPTY;
}

function capture(r, c) {
  const player = board[r][c];
  const enemy = player === BLACK ? WHITE : BLACK;

  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];

  for (const [dr, dc] of dirs) {
    const captured = [];

    let nr = r + dr;
    let nc = c + dc;

    while (
      nr >= 0 && nr < 5 &&
      nc >= 0 && nc < 5 &&
      board[nr][nc] === enemy
    ) {
      captured.push({ r: nr, c: nc });
      nr += dr;
      nc += dc;
    }

    if (
      captured.length > 0 &&
      nr >= 0 && nr < 5 &&
      nc >= 0 && nc < 5 &&
      board[nr][nc] === player
    ) {
      captured.forEach(p => {
        board[p.r][p.c] = EMPTY;
      });
    }
  }
}

function countPieces() {
  let blackCount = 0;
  let whiteCount = 0;

  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (board[r][c] === BLACK) blackCount++;
      if (board[r][c] === WHITE) whiteCount++;
    }
  }

  return { blackCount, whiteCount };
}

function updateStatus() {
  const counts = countPieces();

  document.getElementById("count").textContent =
    `黒：${counts.blackCount}　白：${counts.whiteCount}`;

  document.getElementById("turn").textContent =
    currentPlayer === BLACK ? "黒の番" : "白の番";
}

function hasAnyMove(player) {
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (board[r][c] === player) {
        if (getMoves(r, c).length > 0) return true;
      }
    }
  }
  return false;
}

function checkWinner() {
  const counts = countPieces();
  const message = document.getElementById("message");
  const onePieceLose = document.getElementById("onePieceLose").checked;

  if (counts.blackCount === 0) {
    message.textContent = "白の勝ち！";
    gameOver = true;
    return true;
  }

  if (counts.whiteCount === 0) {
    message.textContent = "黒の勝ち！";
    gameOver = true;
    return true;
  }

  if (onePieceLose) {
    if (counts.blackCount === 1) {
      message.textContent = "白の勝ち！（黒が1個）";
      gameOver = true;
      return true;
    }
    if (counts.whiteCount === 1) {
      message.textContent = "黒の勝ち！（白が1個）";
      gameOver = true;
      return true;
    }
  }

  const nextPlayer = currentPlayer === BLACK ? WHITE : BLACK;

  if (!hasAnyMove(nextPlayer)) {
    message.textContent =
      nextPlayer === BLACK
        ? "白の勝ち！（黒は動けない）"
        : "黒の勝ち！（白は動けない）";

    gameOver = true;
    return true;
  }

  message.textContent = "";
  return false;
}

init();
</script>

</body>
</html>
